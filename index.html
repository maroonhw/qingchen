<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">

<title>轻尘</title>
<style>
:root{--accent:#3a8f5f;--accent-deep:#2c6b47;--bg:#fff;--fg:#1c1c1e;--muted:#6b6b70;--card:#f5f6f5;--border:#e5e6e5}
@media (prefers-color-scheme:dark){:root{--bg:#0f1110;--fg:#ececec;--muted:#9a9a9f;--card:#1a1d1b;--border:#2a2d2b;--accent:#5fb583;--accent-deep:#8fd0a8}}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;line-height:1.75;color:var(--fg);background:var(--bg);-webkit-text-size-adjust:100%}
.wrap{max-width:680px;margin:0 auto;padding:56px 20px 64px;text-align:center}
.logo{width:72px;height:72px;border-radius:18px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:38px;margin:0 auto 18px}
h1{font-size:1.8rem;margin:.2em 0}
.tagline{color:var(--muted);font-size:1.05rem;margin-bottom:8px}
.desc{color:var(--fg);max-width:520px;margin:18px auto 28px}
.links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:24px}
.links a{display:inline-block;padding:11px 20px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--accent-deep);text-decoration:none;font-weight:600}
.links a:hover{border-color:var(--accent)}
footer{margin-top:48px;color:var(--muted);font-size:.85rem}
footer a{color:var(--accent-deep)}
</style>
</head>
